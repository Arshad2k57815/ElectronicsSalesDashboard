<!DOCTYPE html>
<html>

<head>

    <title>Add Order</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/dashboard.css') }}">

</head>

<body>

<div class="sidebar">

    <h2>ElectroSales</h2>

    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/orders">📋 Orders</a>
    <a href="/products">📦 Products</a>
    <a href="/customers">👥 Customers</a>
    <a href="/analytics">📈 Analytics</a>
    <a href="/">🚪 Logout</a>
    <a href="/ai_prediction">🤖 AI Prediction</a>

</div>

<div class="main">

    <h1>Add New Order</h1>

    <div class="card" style="width:550px;">

        <form method="POST">

            <input type="text"
                   name="customer"
                   placeholder="Customer Name"
                   required>

            <input type="text"
                   name="product"
                   placeholder="Product Name"
                   required>

            <input type="number"
                   name="quantity"
                   placeholder="Quantity"
                   required>

            <input type="number"
                   name="price"
                   placeholder="Total Price"
                   required>

            <select name="status"
                    style="width:100%;padding:12px;margin:12px 0;border-radius:8px;">

                <option value="Pending">Pending</option>
                <option value="Delivered">Delivered</option>
                <option value="Cancelled">Cancelled</option>

            </select>

            <button type="submit">

                Add Order

            </button>

        </form>

    </div>

</div>

</body>

</html>
