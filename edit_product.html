<!DOCTYPE html>
<html>

<head>

<title>Edit Product</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/dashboard.css') }}">

</head>

<body>

<div class="main">

<h1>Edit Product</h1>

<div class="form-card">

<form method="POST">

<input
type="text"
name="name"
value="{{ product.name }}"
required>

<input
type="text"
name="brand"
value="{{ product.brand }}"
required>

<input
type="number"
name="price"
value="{{ product.price }}"
required>

<input
type="number"
name="stock"
value="{{ product.stock }}"
required>

<button type="submit">

Update Product

</button>

</form>

</div>

</div>

</body>

</html>
